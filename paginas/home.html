<!-- ////////////////////////////////////////////////////////////////////////////////////////////// -->
<!-- Pop-up de pedido -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////// -->

<div id="popup-overlay" class="popup-overlay" onclick="fecharPopup(event)">
    <div class="popup">
        <button class="popup-fechar" onclick="fecharPopupBtn()">&#x2715;</button>
        <h2 class="popup-titulo">Fazer Pedido</h2>
        <p id="popup-produto-nome" class="popup-produto-nome"></p>
        <p id="popup-produto-preco" class="popup-produto-preco"></p>
        <div class="popup-campo"> <!-- Nome da pessoa -->
            <label for="pedido-nome">Seu nome</label>
            <input type="text" id="pedido-nome" placeholder="Ex: Maria Silva">
        </div>
        <div class="popup-campo"> <!-- Contato -->
            <label for="pedido-telefone">WhatsApp</label>
            <input type="tel" id="pedido-telefone" placeholder="Ex: (14) 99999-9999">
        </div>
        
        <div class="popup-campo">  <!-- Unidades do produto -->
            <label for="pedido-quantidade">Quantidade</label>
            <input type="number" id="pedido-quantidade" min="1" value="1">
        </div>

        <div class="popup-campo">  <!-- Cidade (entre três opções) -->
            <label for="pedido-cidade">Cidade</label>
            <select id="pedido-cidade">
                <option value="">Selecione sua cidade</option>
                <option value="Ourinhos">Ourinhos</option>
                <option value="Chavantes">Chavantes</option>
                <option value="Canitar">Canitar</option>
            </select>
        </div>

        <div class="popup-campo"> <!-- Endereço -->
            <label for="pedido-endereco">Endereço</label>
            <input type="text" id="pedido-endereco" placeholder="Rua, nº, Bairro">
        </div>

        <div class="popup-campo"> <!-- Observações -->
            <label for="pedido-obs">Observações</label>
            <textarea id="pedido-obs" rows="3" placeholder="Tamanho, personalização..."></textarea>
        </div>
        <button class="btn popup-btn" onclick="">Confirmar Pedido</button>
    </div>
</div>
