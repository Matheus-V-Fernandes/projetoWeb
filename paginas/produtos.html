<!-- ////////////////////////////////////////////////////////////////////////////////////////////// -->
<!-- Página de gerenciamento dos produtos -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////// -->

<div id="pagina-produtos">
    <div class="categorias">
        <div class="corpo-categorias">
            <h2 class="titulo">Gerenciar Produtos</h2>

            <div class="produtos-form"> <!-- Formulário para registro e edição de produtos -->
                <h3>Adicionar / Editar Produto</h3>

                <!--Formulário para adição/edição de produtos-->
                <!--Preenchido: edição / Vazio: Adição-->
                <input type="hidden" id="produtos-id">

                <!--Campos a ser coletados: Nome, Preço, Imagem, Descricao, Categoria-->
                <div class="popup-campo"> <!-- Nome do produto -->
                    <label>Nome do produto</label>
                    <input type="text" id="produtos-nome" placeholder="Ex: Tapete redondo (Verde)">
                </div>
                <div class="popup-campo"> <!-- Preço -->
                    <label>Preço (R$)</label>
                    <input type="number" id="produtos-preco" placeholder="Ex: 39.99" step="0.01" min="0">
                </div>
                <div class="popup-campo"> <!-- Imagem -->
                    <label>Imagem</label>
                    <div id="drop-area">
                        <p>Arraste a imagem aqui ou clique para selecionar</p>
                        <input type="file" id="produtos-file" accept="image/*" hidden>
                        <img id="preview-img" src="#" alt="Prévia" style="display:none;">
                    </div>
                </div>
                <div class="popup-campo"> <!-- Alt da Imagem -->
                    <label>Descrição da imagem</label>
                    <input type="text" id="produtos-alt" placeholder="Descrição da imagem">
                </div>
                <div class="popup-campo"> <!-- Categoria (entre as três possíveis) -->
                    <label>Categoria</label>
                    <select id="produtos-cat">
                        <option value="destaque">Destaque</option>
                        <option value="oferta">Oferta</option>
                        <option value="catalogo">Catálogo</option>
                    </select>
                </div>


                <div class="produtos-btns"> <!-- Botões de salvamento e limpeza do formulário -->
                    <button class="btn" onclick="">Salvar Produto</button>
                    <button class="btn btn-cancelar" onclick="">Limpar</button>
                </div>

            </div> <!-- Fim do formulário -->

            <h3 style="margin:30px 0 15px; color:#555">Produtos cadastrados</h3>

            <!-- Lista dos produtos já registrados -->
            <div id="produtos-lista-produtos" class="produtos-lista">
                <!-- gerado pelo JS -->
            </div>
        </div>
    </div>
</div>
