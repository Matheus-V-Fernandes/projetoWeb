<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço e Linha - Ourinhos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
    <!-- Barra de navegação e banner principal -->
    <div class="banner">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <a id="nome_logo" href="#" onclick="mostrarPagina('home')"> Laço & Linha</a> 
                </div> 
                <nav>
                    <ul id="MenuItens"> <!-- Menu de navegação-->
                        <li><a href="#" onclick="mostrarPagina('home')">Catálogo</a></li>
                        <li class="admin"><a href="#" onclick="mostrarPagina('pedidos')">Pedidos</a></li>
                        <li class="admin"><a href="#" onclick="mostrarPagina('produtos')">Produtos</a></li>
                        <li class="visitante" ><a href="#" onclick="autenticar()"> Admin <img src="imgs/cadeado.png" width="20px" alt="Ícone de cadeado"></a></li>
                        <!-- <a href="https://www.flaticon.com/free-icons/caps-lock" title="caps lock icons">Caps lock icons created by Dave Gandy - Flaticon</a>-->
                        <li class="admin"><a href="#"  onclick="sair()">Sair <img src="imgs/logout.png" width="20px" alt="Ícone de saída"></a></li>
                        <!-- <a href="https://www.flaticon.com/free-icons/log-out" title="log out icons">Log out icons created by Smashicons - Flaticon</a> -->
                    </ul>
                </nav>
                <!--Menu para o celular -->
                <img src="imgs/menuCelular.png" alt="Três traços (menu)" class="menu-celular" onclick="menucelular()">
                <!-- <a href="https://www.flaticon.com/free-icons/hamburger" title="hamburger icons">Hamburger icons created by Hasin Almas - Flaticon</a> -->
            </div>
            <small id="sub_logo">artesanatos em barbante</small>

            <!-- Banner principal -->
            <div id="banner-principal" class="linha">
                <div class="col-2">
                    <h1>Feito com carinho, <br>nó por nó</h1>
                    <p>Peças únicas de crochê e bordado artesanal. Encomende com a sua cor preferida!</p>
                    <br><a href="#catalogo" class="btn">Ver Catálogo &#8595;</a>
                </div>
                <div class="col-2">
                    <img src="imgs/banner-1.png" alt="Background com cesto com barbante" width="200px">
                </div>
            </div>
        </div>
    </div>
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->

<div id="conteudo"></div> <!-- Conteúdo a ser carregado com fetch -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
    <!-- Rodapé -->
    <footer class="rodape">
        <div class="container">
            <div class="linha">
                <div class="rodape-col-1">
                    <h3>&#169 2026 Laço & Linha — Todos os direitos reservados.</h3>
                    <div class="contato">
                        <h2>Fale conosco</h2>
                        <img src="imgs/whatsapp.png" alt="Logo do whatsapp" width="30px" height="30px">
                        <!-- <a href="https://www.flaticon.com/br/icones-gratis/whatsapp" title="whatsapp ícones">Whatsapp ícones criados por Freepik - Flaticon</a> -->
                    </div>
                </div>
            </div>
        </div>
    </footer>
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////////////// -->
    <!-- scrip -->
    <script src="loja.js"></script>
</body>
</html>
